<html>
    <head>
        <title>Coco Rayado</title>
        <style>
            *{
                margin:0px;
                padding:0px;
            }
             body{
                background-color: #000000;
             }
            .contenedor{
              width: 1500px;
              height:600px;
              position: relative;
              margin:0 auto;
              border: 1px solid #000000;
              overflow: hidden;
            }
            .marco1{
                width:300px;
                height:600px;
                background-color :orange;
                position:absolute;
                top:0px;
                left:1200px;

                animation: marco1 3s 1 forwards;
                background-image: url(img1/css.jpg);
                background-size: cover;
            }

            @keyframes marco1 {
                0%{
                    top:0px;
                    left:1200px;
                    transform:rotateY(180deg);
                }
                100%{
                    top:0px;
                    left:0px;
                }
                }
            .marco2{
                width:300px;
                height:600px;
                background-color: red;
                position:absolute;
                top:0px;
                left:1200px;

                animation:  marco2 3s 1 forwards 1s;
                background-image: url(img1/html.jpg);
                background-size: cover;
            }
             @keyframes marco2 {

                 0%{
                 top:0px;
                 left:1200px;
                 transform:rotateY(180deg);
                 }

                 100%{
                 top:0px;
                 left:300px;
                 }

                 }
            .marco3{
                width:300px;
                height:600px;
                background-color: pink;
                position:absolute;

                 top:600px;
                 left:600px;

                 animation: marco3 3s 1 forwards 2s;

                background-image:url(img1/javascript.png);
                background-size:cover;
                 }
            @keyframes marco3 {

             0%{
             top:600px;
             left:600px;
             transform:rotateX(180deg);
             }

             100%{
             top:0px;
             left:600px;
             }

            }
            .marco4{
           
             width:300px;
             height:600px;
              background-color: green;
             position:absolute;

             top:0px;
             left:-300px;

             animation: marco4 3s 1 forwards 3s;

             background-image:url(img1/visualstudio.png);
             background-size:cover;
}
            @keyframes marco4 {
        

             0%{
             top:0px;
             left:-300px;
             transform:rotateY(180deg);
            }

             100%{
             top:0px;
             left:900px;
             }

            }
            .marco5{

             width:300px;
             height:600px;
             background-color: blue ;
             position:absolute;

             top:0px;
             left:-300px;

             animation: marco5 3s 1 forwards 4s;

             background-image:url(img1/php.png);
            background-size:cover;
}
            @keyframes marco5 {
                0%{
                    top:-300px;
                    left:400px;
                    transform:rotateY(180deg);
                }
                100%{
                    top:0px;
                    left:1200px;
                }
            }
             .titulo{
             width:1500px;
             height:60px;

             position:absolute;

             top:270px;
             left:0px;

              background:rgba(0,0,0,0.7);

             color:white;

             text-align:center;
              line-height:60px;

             font-size:35px;
             font-family:Arial;
             font-weight:bold;
              letter-spacing:3px;

              animation:titulo 3s 1 forwards;
             }
             @keyframes titulo{

              0%{
              opacity:0;
              transform:scale(0);
             }

              100%{
             opacity:1;
             transform:scale(1);
              }

             }
        </style>
    </head>
    <body>
        <div class="contenedor">
            <div class="marco1"></div>
            <div class="marco2"></div>
            <div class="marco3"></div>
            <div class="marco4"></div>
            <div class="marco5"></div>
            <div class="titulo">
              TECNOLOGIAS EMERGENTES DE LA COMPUTACION WEB
        </div>
    </body>
</html>
